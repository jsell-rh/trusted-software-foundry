apiVersion: foundry/v1
kind: Application

metadata:
  name: fleet-manager
  version: 1.0.0
  description: >
    OpenShift Fleet Manager — a multi-tenant SaaS control plane for managing
    OpenShift cluster lifecycles at Red Hat scale. Demonstrates every foundry
    capability: multi-service architecture, graph topology, SpiceDB authz,
    Temporal workflows, Kafka events, Redis distributed state, NATS service
    bus, and hook-based audit/policy enforcement.

# Trusted component versions — the application SBOM.
components:
  foundry-http:           v1.0.0
  foundry-postgres:       v1.0.0
  foundry-auth-jwt:       v1.0.0
  foundry-grpc:           v1.0.0
  foundry-health:         v1.0.0
  foundry-metrics:        v1.0.0
  foundry-events:         v1.0.0
  foundry-auth-spicedb:   v1.0.0
  foundry-graph-age:      v1.0.0
  foundry-kafka:          v1.0.0
  foundry-nats:           v1.0.0
  foundry-redis:          v1.0.0
  foundry-redis-streams:  v1.0.0
  foundry-temporal:       v1.0.0
  foundry-tenancy:        v1.0.0
  foundry-service-router: v1.0.0

# Core data resources.
resources:
  - name: Cluster
    plural: clusters
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: name
        type: string
        required: true
        max_length: 253     # DNS subdomain max
      - name: provider
        type: string
        required: true
        max_length: 64      # aws, gcp, azure, on-prem
      - name: region
        type: string
        required: true
        max_length: 64
      - name: status
        type: string
        required: true
        max_length: 32      # ready, provisioning, upgrading, failed, deprovisioning
      - name: version
        type: string
        required: false
        max_length: 32      # OpenShift version e.g. 4.17.3
      - name: node_count
        type: int
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]
    events: true

  - name: ClusterUpgrade
    plural: cluster-upgrades
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: cluster_id
        type: uuid
        required: true
      - name: from_version
        type: string
        required: true
        max_length: 32
      - name: to_version
        type: string
        required: true
        max_length: 32
      - name: state
        type: string
        required: true
        max_length: 32      # scheduled, running, completed, failed, cancelled
      - name: scheduled_at
        type: timestamp
        required: false
      - name: started_at
        type: timestamp
        required: false
      - name: completed_at
        type: timestamp
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, list]
    events: true

  - name: NodePool
    plural: node-pools
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: cluster_id
        type: uuid
        required: true
      - name: name
        type: string
        required: true
        max_length: 253
      - name: instance_type
        type: string
        required: true
        max_length: 64
      - name: replica_count
        type: int
        required: true
      - name: autoscaling_enabled
        type: bool
        required: false
      - name: min_replicas
        type: int
        required: false
      - name: max_replicas
        type: int
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]
    events: false

# API surface.
api:
  rest:
    base_path: /api/fleet-manager/v1
    version_header: true
  grpc:
    enabled: true
    port: 9000

# Authentication (Red Hat SSO / OCM token validation).
auth:
  type: jwt
  jwk_url: "${JWK_CERT_URL}"
  required: true
  allow_mock: "${OCM_MOCK_ENABLED}"

# Database.
database:
  type: postgres
  migrations: auto

# Observability.
observability:
  health_check:
    port: 8083
    path: /healthz
  metrics:
    port: 8080
    path: /metrics

# Multi-tenant organization isolation.
tenancy:
  field: org_id
  strategy: row
  header: X-Organization-Id

# Fine-grained authorization via SpiceDB.
authz:
  backend: spicedb
  schema_file: authz/schema.zed
  relations:
    - resource: Cluster
      relation: owner
      subject: Organization
    - resource: Cluster
      relation: viewer
      subject: User
    - resource: Cluster
      relation: editor
      subject: User
    - resource: NodePool
      relation: owner
      subject: Cluster

# Graph topology (Apache AGE) — cluster-to-node relationships.
graph:
  backend: age
  graph_name: fleet_topology
  node_types:
    - label: Cluster
      id_field: id
      properties: [name, provider, region, status, version]
    - label: NodePool
      id_field: id
      properties: [name, instance_type, replica_count]
    - label: Workload
      id_field: id
      properties: [name, namespace, replicas, image]
  edge_types:
    - label: HAS_NODE_POOL
      from: Cluster
      to: NodePool
      properties: [created_at]
    - label: RUNS
      from: NodePool
      to: Workload
      properties: [scheduled_at, cpu_request, memory_request]
    - label: DEPENDS_ON
      from: Workload
      to: Workload
      properties: [dependency_type]

# Distributed services — separate deployable binaries.
services:
  - name: api-server
    role: gateway
    description: Handles all inbound REST and gRPC client requests.
    components:
      - foundry-http
      - foundry-grpc
      - foundry-postgres
      - foundry-auth-jwt
      - foundry-auth-spicedb
      - foundry-health
      - foundry-metrics
      - foundry-tenancy
      - foundry-service-router
    port: 8000

  - name: provisioner
    role: worker
    description: Executes cluster provisioning and upgrade Temporal workflows.
    components:
      - foundry-postgres
      - foundry-temporal
      - foundry-kafka
      - foundry-redis
      - foundry-health
      - foundry-metrics
    port: 8001

  - name: graph-indexer
    role: worker
    description: Consumes cluster lifecycle events and maintains the graph topology.
    components:
      - foundry-postgres
      - foundry-graph-age
      - foundry-nats
      - foundry-redis-streams
      - foundry-health
      - foundry-metrics
    port: 8002

# Event streaming configuration.
events:
  backend: kafka
  broker_url: "${KAFKA_BROKER_URL}"
  topics:
    - name: fleet.cluster.lifecycle
      resource: Cluster
      operations: [create, update, delete]
      partitions: 12
      retention_hours: 168    # 7 days
    - name: fleet.upgrade.state
      resource: ClusterUpgrade
      operations: [create, update]
      partitions: 6
      retention_hours: 720    # 30 days
    - name: fleet.nodepool.changes
      resource: NodePool
      operations: [create, update, delete]
      partitions: 6
      retention_hours: 168

# Temporal workflow configuration.
temporal:
  namespace: fleet-manager
  worker_queue: fleet-provisioning
  workflows:
    - name: ProvisionCluster
      resource: Cluster
      trigger: create
      activities:
        - ValidateProviderQuota
        - CreateNetworkInfrastructure
        - ProvisionControlPlane
        - RegisterWorkerNodes
        - ConfigureNetworking
        - WaitForClusterReady
        - PublishClusterReady
    - name: UpgradeCluster
      resource: ClusterUpgrade
      trigger: create
      activities:
        - ValidateUpgradePath
        - BackupClusterState
        - DrainAndUpgradeControlPlane
        - RollingUpgradeWorkerNodes
        - ValidateClusterHealth
        - PublishUpgradeComplete
    - name: DeprovisionCluster
      resource: Cluster
      trigger: delete
      activities:
        - GraceFullyEvictWorkloads
        - DeleteNodePools
        - ReleaseNetworkResources
        - PurgeGraphNodes
        - ArchiveClusterHistory

# Distributed state (Redis).
state:
  backend: redis
  url: "${REDIS_URL}"
  keys:
    - name: cluster_provision_lock
      resource: Cluster
      strategy: distributed_lock
      ttl_seconds: 3600
    - name: upgrade_window_lock
      resource: ClusterUpgrade
      strategy: distributed_lock
      ttl_seconds: 7200
    - name: cluster_status_cache
      resource: Cluster
      strategy: cache
      ttl_seconds: 30

# Lifecycle hooks — human-written Go files at injection points.
hooks:
  - name: audit-logger
    point: pre-db
    implementation: hooks/audit_logger.go

  - name: tenant-isolation-check
    point: pre-handler
    implementation: hooks/tenant_isolation.go

  - name: cluster-status-enricher
    point: post-handler
    routes: ["/api/fleet-manager/v1/clusters"]
    implementation: hooks/cluster_status_enricher.go

  - name: event-schema-validator
    point: pre-publish
    implementation: hooks/event_schema_validator.go

  - name: graph-sync-consumer
    point: post-consume
    topic: fleet.cluster.lifecycle
    implementation: hooks/graph_sync_consumer.go
