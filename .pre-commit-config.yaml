repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: bash -c 'UNFORMATTED=$(gofmt -l .); if [ -n "$UNFORMATTED" ]; then echo "Not gofmt-clean (run: gofmt -w .):"; echo "$UNFORMATTED"; exit 1; fi'
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        pass_filenames: false
        types: [go]
