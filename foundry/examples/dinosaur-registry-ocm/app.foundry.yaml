apiVersion: foundry/v1
kind: Application

metadata:
  name: dinosaur-registry-ocm
  version: 1.0.0
  description: >
    Dinosaur registry with OCM authentication — validates Red Hat SSO bearer tokens.
    Demonstrates the OCM auth component as a drop-in replacement for JWT auth.

# Trusted component versions — OCM auth variant
components:
  foundry-http:     v1.0.0
  foundry-postgres: v1.0.0
  foundry-auth-ocm: v1.0.0
  foundry-health:   v1.0.0
  foundry-metrics:  v1.0.0

resources:
  - name: Dinosaur
    plural: dinosaurs
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: species
        type: string
        required: true
        max_length: 255
      - name: description
        type: string
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]

api:
  rest:
    base_path: /api/v1
    version_header: true

# OCM authentication — validates Red Hat SSO bearer tokens.
auth:
  type: ocm
  ocm_url: "${OCM_URL}"
  allowed_orgs: []
  cache_ttl: "5m"
  required: true

database:
  type: postgres
  migrations: auto

observability:
  health_check:
    port: 8083
  metrics:
    port: 8080
    path: /metrics
