apiVersion: foundry/v1
kind: Application

metadata:
  name: kartograph
  version: 3.25.1
  description: >
    Kartograph — Enterprise-Ready Bi-Temporal Knowledge Graphs as a Service.
    A property graph platform that makes institutional knowledge queryable and
    auditable. Built on PostgreSQL/Apache AGE, secured with SpiceDB fine-grained
    authz and OIDC/JWK authentication. Demonstrates Trusted Software Foundry:
    graph storage, authz, HTTP API, outbox events, and health observability.

# Trusted component versions — the application SBOM.
components:
  foundry-http:         v1.0.0
  foundry-postgres:     v1.0.0
  foundry-graph-age:    v1.0.0
  foundry-auth-jwt:     v1.0.0
  foundry-auth-spicedb: v1.0.0
  foundry-health:       v1.0.0
  foundry-metrics:      v1.0.0
  foundry-events:       v1.0.0
  foundry-kafka:        v1.0.0
  foundry-tenancy:      v1.0.0

# Core data resources — the knowledge graph domain model.
resources:
  - name: Graph
    plural: graphs
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: name
        type: string
        required: true
        max_length: 253
      - name: description
        type: string
        required: false
        max_length: 2048
      - name: node_count
        type: int
        required: false
      - name: edge_count
        type: int
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]
    events: true

  - name: Node
    plural: nodes
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: graph_id
        type: uuid
        required: true
      - name: label
        type: string
        required: true
        max_length: 128
      - name: properties
        type: string
        required: false
      - name: valid_from
        type: timestamp
        required: true       # bi-temporal: application time start
        auto: created
      - name: valid_to
        type: timestamp
        required: false      # null = current
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
    operations: [create, read, update, delete, list]
    events: true

  - name: Edge
    plural: edges
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: graph_id
        type: uuid
        required: true
      - name: from_node_id
        type: uuid
        required: true
      - name: to_node_id
        type: uuid
        required: true
      - name: label
        type: string
        required: true
        max_length: 128
      - name: properties
        type: string
        required: false
      - name: valid_from
        type: timestamp
        required: true
        auto: created
      - name: valid_to
        type: timestamp
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
    operations: [create, read, update, delete, list]
    events: false

  - name: Query
    plural: queries
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: graph_id
        type: uuid
        required: true
      - name: cypher
        type: string
        required: true
        max_length: 65535
      - name: executed_at
        type: timestamp
        auto: created
      - name: duration_ms
        type: int
        required: false
      - name: result_count
        type: int
        required: false
    operations: [create, read, list]
    events: false

# API surface — REST + MCP (Model Context Protocol) server.
api:
  rest:
    base_path: /api/kartograph/v1
    version_header: true

# Authentication — OIDC/JWK (Keycloak in production, mock in dev).
auth:
  type: jwt
  jwk_url: "${KARTOGRAPH_OIDC_JWK_URL}"
  required: true
  allow_mock: "${KARTOGRAPH_ALLOW_MOCK_AUTH}"

# Database — PostgreSQL with Apache AGE graph extension.
database:
  type: postgres
  migrations: auto

# Observability.
observability:
  health_check:
    port: 8083
    path: /healthz
  metrics:
    port: 8080
    path: /metrics

# Multi-tenant isolation — each organization owns its graphs.
tenancy:
  field: org_id
  strategy: row
  header: X-Organization-Id

# Fine-grained authorization via SpiceDB / Authzed.
authz:
  backend: spicedb
  schema_file: authz/schema.zed
  relations:
    - resource: Graph
      relation: owner
      subject: Organization
    - resource: Graph
      relation: viewer
      subject: User
    - resource: Graph
      relation: editor
      subject: User
    - resource: Node
      relation: owner
      subject: Graph
    - resource: Edge
      relation: owner
      subject: Graph

# Apache AGE graph topology — the core value proposition.
graph:
  backend: age
  graph_name: kartograph_graph
  node_types:
    - label: Node
      id_field: id
      properties: [label, properties, valid_from, valid_to]
    - label: Organization
      id_field: id
      properties: [name]
  edge_types:
    - label: EDGE
      from: Node
      to: Node
      properties: [label, properties, valid_from, valid_to]
    - label: OWNS_GRAPH
      from: Organization
      to: Node
      properties: [created_at]

# Outbox events — for audit trail and external integrations.
events:
  backend: kafka
  broker_url: "${KARTOGRAPH_EVENTS_BROKER_URL}"
  topics:
    - name: kartograph.graph.lifecycle
      resource: Graph
      operations: [create, update, delete]
      partitions: 6
      retention_hours: 720    # 30 days — full audit trail
    - name: kartograph.node.mutations
      resource: Node
      operations: [create, update, delete]
      partitions: 12
      retention_hours: 720

# Lifecycle hooks — enforce Kartograph invariants at key injection points.
hooks:
  - name: bi-temporal-validator
    point: pre-db
    implementation: hooks/bitemporal_validator.go

  - name: graph-access-logger
    point: pre-handler
    implementation: hooks/graph_access_logger.go

  - name: query-cost-guard
    point: pre-handler
    routes: ["/api/kartograph/v1/graphs/{id}/query"]
    implementation: hooks/query_cost_guard.go

  - name: age-graph-sync
    point: post-db
    implementation: hooks/age_graph_sync.go
