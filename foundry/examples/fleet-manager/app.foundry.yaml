apiVersion: foundry/v1
kind: Application

metadata:
  name: fleet-manager
  version: 1.0.0
  description: >
    OpenShift Fleet Manager — a multi-tenant SaaS control plane for managing
    OpenShift cluster lifecycles at Red Hat scale. Demonstrates multi-resource
    architecture, OCM authentication, row-level tenancy, and hook-based
    audit/policy enforcement.

# Trusted component versions — the application SBOM.
components:
  foundry-http:     v1.0.0
  foundry-postgres: v1.0.0
  foundry-auth-ocm: v1.0.0
  foundry-health:   v1.0.0
  foundry-metrics:  v1.0.0
  foundry-tenancy:  v1.0.0

# Core data resources.
resources:
  - name: Cluster
    plural: clusters
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: name
        type: string
        required: true
        max_length: 253     # DNS subdomain max
      - name: provider
        type: string
        required: true
        max_length: 64      # aws, gcp, azure, on-prem
      - name: region
        type: string
        required: true
        max_length: 64
      - name: status
        type: string
        required: true
        max_length: 32      # ready, provisioning, upgrading, failed, deprovisioning
      - name: version
        type: string
        required: false
        max_length: 32      # OpenShift version e.g. 4.17.3
      - name: node_count
        type: int
        required: false
      - name: org_id
        type: string
        required: true
        max_length: 36      # OCM organization ID (tenant key)
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]

  - name: ClusterUpgrade
    plural: cluster-upgrades
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: cluster_id
        type: uuid
        required: true
      - name: from_version
        type: string
        required: true
        max_length: 32
      - name: to_version
        type: string
        required: true
        max_length: 32
      - name: status
        type: string
        required: true
        max_length: 32      # pending, in-progress, complete, failed
      - name: scheduled_at
        type: timestamp
        required: false
      - name: started_at
        type: timestamp
        required: false
      - name: completed_at
        type: timestamp
        required: false
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]

  - name: NodePool
    plural: node-pools
    fields:
      - name: id
        type: uuid
        required: true
        auto: created
      - name: cluster_id
        type: uuid
        required: true
      - name: name
        type: string
        required: true
        max_length: 253
      - name: instance_type
        type: string
        required: true
        max_length: 64
      - name: replica_count
        type: int
        required: true
      - name: status
        type: string
        required: true
        max_length: 32      # ready, scaling, failed
      - name: created_at
        type: timestamp
        auto: created
      - name: updated_at
        type: timestamp
        auto: updated
      - name: deleted_at
        type: timestamp
        soft_delete: true
    operations: [create, read, update, delete, list]

# REST API.
api:
  rest:
    base_path: /api/fleet-manager/v1
    version_header: true

# OCM (OpenShift Cluster Manager) authentication.
auth:
  type: ocm
  ocm_url: "${OCM_BASE_URL}"
  required: true
  cache_ttl: 5m
  allowed_orgs: []

# PostgreSQL database with auto-migrations.
database:
  type: postgres
  dsn: "${DATABASE_DSN}"
  max_open_conns: 20
  max_idle_conns: 5

# Observability.
observability:
  health_check:
    port: 8083
  metrics:
    port: 8084
    path: /metrics

# Row-level multi-tenancy (by OCM organization).
tenancy:
  field: org_id
  strategy: row
  header: X-Organization-Id

# Lifecycle hooks — human-written Go files at injection points.
hooks:
  - name: audit-logger
    point: pre-db
    implementation: hooks/audit_logger.go

  - name: tenant-isolation-check
    point: pre-handler
    implementation: hooks/tenant_isolation.go

  - name: cluster-status-enricher
    point: post-handler
    routes: ["/api/fleet-manager/v1/clusters"]
    implementation: hooks/cluster_status_enricher.go
